# nginx reverse proxy for the Ontario Land Use Planning Chat.
#
# Proxies to the react-router-serve Node.js app on localhost:3000.
# TLS is terminated by nginx via Let's Encrypt (certbot --nginx).
#
# Install:
#   sudo cp deploy/nginx/ontario-land-use-chat.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/ontario-land-use-chat.conf \
#               /etc/nginx/sites-enabled/ontario-land-use-chat.conf
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# --- TLS setup ---
#
# This config is the pre-certbot form: port 80 serves the proxy (so the
# HTTP-01 challenge can be served) and port 443 uses a self-signed cert
# as a placeholder. After running:
#   sudo certbot --nginx --non-interactive --agree-tos \
#     --register-unsafely-without-email -d ontariochat.duckdns.org
# certbot rewrites the config to add the LE cert paths on 443 and the
# 301 redirect on 80. The live config on EC2 is managed by certbot after
# that point (lines marked "# managed by Certbot" should not be hand-edited).
#
# DuckDNS keeps ontariochat.duckdns.org pointed at the EC2 instance IP.
# See /opt/duckdns/duck.sh + duckdns.timer on the EC2 host.

# Increase upload/body limits for conversation message payloads
client_max_body_size 10m;

# Upstream — the Node.js app
upstream ontario_chat {
    server 127.0.0.1:3000;
    keepalive 16;
}

# HTTP — serves proxy for HTTP-01 challenge; certbot adds 301 redirect after issuance
server {
    listen 80;
    server_name ontariochat.duckdns.org;

    location / {
        proxy_pass http://ontario_chat;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # --- SSE streaming (critical for /api/chat) ---
        proxy_buffering    off;
        proxy_cache        off;
        proxy_set_header   Connection "";
        chunked_transfer_encoding on;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        proxy_set_header Upgrade    $http_upgrade;
    }
}

# HTTPS — self-signed placeholder (certbot replaces with LE cert paths)
server {
    listen 443 ssl;
    server_name ontariochat.duckdns.org;

    ssl_certificate     /etc/nginx/ssl/ontario-land-use-chat.crt;
    ssl_certificate_key /etc/nginx/ssl/ontario-land-use-chat.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://ontario_chat;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # --- SSE streaming (critical for /api/chat) ---
        proxy_buffering    off;
        proxy_cache        off;
        proxy_set_header   Connection "";
        chunked_transfer_encoding on;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        proxy_set_header Upgrade    $http_upgrade;
    }
}